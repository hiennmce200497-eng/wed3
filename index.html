<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Ảnh Tương Tác JavaScript</title>
    <style>
        /* CSS cơ bản để tạo khung hiển thị */
        #image {
            width: 80%;
            height: 300px;
            border: 3px solid #333;
            margin: 20px auto;
            background-color: #8e44ad;
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            text-shadow: 1px 1px 5px #000;
        }
        .preview {
            width: 150px;
            margin: 10px;
            cursor: pointer;
            border: 2px solid #ccc;
        }
        .gallery {
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Khung hiển thị lớn thay đổi bằng JS -->
    <div id="image">
        Di chuột qua hình ảnh bên dưới để hiển thị tại đây.
    </div>

    <!-- Danh sách ảnh preview nhỏ -->
    <div class="gallery">
        <img class="preview" src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400" alt="Món nướng BBQ hấp dẫn" onmouseover="upDate(this)" onmouseout="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=400" alt="Bánh pancake mật ong" onmouseover="upDate(this)" onmouseout="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400" alt="Pizza hải sản béo ngậy" onmouseover="upDate(this)" onmouseout="unDo()">
    </div>

    <!-- Nhúng file xử lý logic JavaScript -->
    <script src="script.js"></script>
</body>
</html>
