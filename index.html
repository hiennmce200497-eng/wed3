<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Ảnh Tương Tác Nâng Cao - Hiền Minh Nguyễn</title>
    <style>
        #image {
            width: 80%;
            height: 320px;
            border: 4px dashed #2c3e50;
            margin: 20px auto;
            background-color: #7f8c8d;
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            text-shadow: 2px 2px 4px #000;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 10px;
        }
        .preview {
            width: 130px;
            height: 90px;
            margin: 10px;
            cursor: pointer;
            border: 3px solid #ccc;
            transition: all 0.2s;
        }
        /* Hiển thị viền rõ khi dùng phím Tab (Mục 10) */
        .preview:focus {
            border-color: #e74c3c;
            outline: none;
            transform: scale(1.05);
        }
        .gallery {
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="image">
        Di chuột hoặc nhấn Tab qua hình ảnh bên dưới để hiển thị tại đây.
    </div>

    <div class="gallery">
        <img class="preview" src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=500" alt="Món thịt nướng BBQ rực lửa" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=500" alt="Bánh Pancake ngọt ngào xếp tầng" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500" alt="Bánh Pizza hải sản phô mai kéo sợi" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=500" alt="Bánh mì nướng mật ong trái cây" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=500" alt="Salad rau củ trứng luộc thanh đạm" onmouseover="onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
        <img class="preview" src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=500" alt="Mì Ý sốt pesto tôm tươi thơm phức" onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
    </div>

    <script src="script.js"></script>
</body>
</html>
